<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Note Lite</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

header{
  background:#1976d2;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.toolbar{
  display:flex;
  gap:8px;
  padding:10px;
  overflow-x:auto;
  background:white;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
}

#noteArea{
  width:100%;
  height:80vh;
  border:none;
  padding:15px;
  font-size:18px;
  outline:none;
}

.dark{
  background:#111;
  color:white;
}

.dark #noteArea{
  background:#222;
  color:white;
}

.tape{
  background:black;
  color:black;
  border-radius:4px;
  padding:2px;
}

.show{
  color:white;
}
</style>
</head>

<body>

<header>📚 Note Lite</header>

<div class="toolbar">
<button onclick="saveNote()">저장</button>
<button onclick="toggleDark()">다크모드</button>
<button onclick="addTape()">암기테이프</button>
</div>

<div
id="noteArea"
contenteditable="true">
여기에 공부 내용을 입력하세요.
</div>

<script>

const note =
document.getElementById("noteArea");

const saved =
localStorage.getItem("note");

if(saved){
  note.innerHTML = saved;
}

function saveNote(){
  localStorage.setItem(
    "note",
    note.innerHTML
  );

  alert("저장 완료");
}

note.addEventListener(
"input",
()=>{
 localStorage.setItem(
  "note",
  note.innerHTML
 );
}
);

function toggleDark(){

 document.body.classList.toggle(
  "dark"
 );

 localStorage.setItem(
  "dark",
  document.body.classList.contains(
   "dark"
  )
 );
}

if(
 localStorage.getItem("dark")
 === "true"
){
 document.body.classList.add(
  "dark"
 );
}

function addTape(){

 const text =
 window.getSelection().toString();

 if(!text){
   alert(
   "가릴 내용을 드래그해서 선택해!"
   );
   return;
 }

 const html =
 note.innerHTML.replace(
   text,
   '<span class="tape">'+
   text+
   '</span>'
 );

 note.innerHTML = html;

 localStorage.setItem(
  "note",
  note.innerHTML
 );
}

document.addEventListener(
"click",
(e)=>{
 if(
  e.target.classList.contains(
   "tape"
  )
 ){
  e.target.classList.toggle(
   "show"
  );
 }
}
);

</script>

</body>
</html>
