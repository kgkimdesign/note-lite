<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Note Lite</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

header{
  background:#1976d2;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.toolbar{
  display:flex;
  gap:8px;
  padding:10px;
  overflow-x:auto;
  background:white;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
}

#noteArea{
  width:100%;
  height:80vh;
  border:none;
  padding:15px;
  font-size:18px;
  outline:none;
}

.dark{
  background:#111;
  color:white;
}

.dark #noteArea{
  background:#222;
  color:white;
}

.tape{
  background:black;
  color:black;
  border-radius:6px;
  padding:3px 6px;
  cursor:pointer;
  user-select:none;
}

.show{
  color:white;
}
</style>
</head>

<body>

<header>📚 Note Lite</header>

<div class="toolbar">
<button onclick="saveNote()">저장</button>
<button onclick="toggleDark()">다크모드</button>
<button onclick="createBoxTape()">박스테이프</button>
</div>

<div
id="noteArea"
contenteditable="true">
여기에 공부 내용을 입력하세요.
</div>

<script>

const note =
document.getElementById("noteArea");

const saved =
localStorage.getItem("note");

if(saved){
  note.innerHTML = saved;
}

function saveNote(){
  localStorage.setItem(
    "note",
    note.innerHTML
  );

  alert("저장 완료");
}

note.addEventListener(
"input",
()=>{
 localStorage.setItem(
  "note",
  note.innerHTML
 );
}
);

function toggleDark(){

 document.body.classList.toggle(
  "dark"
 );

 localStorage.setItem(
  "dark",
  document.body.classList.contains(
   "dark"
  )
 );
}

if(
 localStorage.getItem("dark")
 === "true"
){
 document.body.classList.add(
  "dark"
 );
}

function addTape(){

 const selection =
 window.getSelection();

 if(selection.rangeCount===0){
   alert("가릴 내용을 선택해!");
   return;
 }

 const range =
 selection.getRangeAt(0);

 if(range.toString().length===0){
   alert("가릴 내용을 선택해!");
   return;
 }

 const span =
 document.createElement("span");

 span.className = "tape";

 span.textContent =
 range.toString();

 range.deleteContents();

 range.insertNode(span);

 localStorage.setItem(
  "note",
  note.innerHTML
 );
}

document.addEventListener(
"click",
(e)=>{
 if(
  e.target.classList.contains(
   "tape"
  )
 ){
  e.target.classList.toggle(
   "show"
  );
 }
}
);
function createBoxTape(){

 const tape =
 document.createElement("div");

 tape.style.position = "fixed";
 tape.style.left = "100px";
 tape.style.top = "200px";
 tape.style.width = "120px";
 tape.style.height = "40px";
 tape.style.background = "black";
 tape.style.borderRadius = "8px";
 tape.style.zIndex = "9999";

 tape.dataset.hidden = "true";

 tape.onclick = function(){

   if(this.dataset.hidden==="true"){

      this.style.background =
      "rgba(0,0,0,0.15)";

      this.dataset.hidden =
      "false";

   }else{

      this.style.background =
      "black";

      this.dataset.hidden =
      "true";
   }
 };
let dragging = false;
let offsetX = 0;
let offsetY = 0;

tape.addEventListener("touchstart",(e)=>{

 dragging = true;

 offsetX =
 e.touches[0].clientX -
 tape.offsetLeft;

 offsetY =
 e.touches[0].clientY -
 tape.offsetTop;

});

document.addEventListener(
"touchmove",
(e)=>{

 if(!dragging) return;

 tape.style.left =
 (
 e.touches[0].clientX -
 offsetX
 ) + "px";

 tape.style.top =
 (
 e.touches[0].clientY -
 offsetY
 ) + "px";

}
);

document.addEventListener(
"touchend",
()=>{

 dragging = false;

}
);
 document.body.appendChild(tape);
  localStorage.setItem(
 "lastTapeX",
 tape.style.left
);

localStorage.setItem(
 "lastTapeY",
 tape.style.top
);
}
</script>

</body>
</html>
